<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Client Login | Sorted.</title>

<link rel="icon" href="../favicon.png">

<style>

:root{
--cream:#f8f1e7;
--cream2:#efe0cc;
--forest:#17261b;
--sage:#314632;
--soft:#718c67;
--gold:#caa76a;
--white:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:linear-gradient(135deg,#f8f1e7,#efe0cc);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.login-card{

width:100%;
max-width:460px;

background:white;

border-radius:30px;

padding:40px;

box-shadow:0 25px 60px rgba(0,0,0,.12);

text-align:center;

}

.logo{

font-size:46px;

font-weight:800;

color:var(--forest);

margin-bottom:10px;

}

.logo span{

color:var(--gold);

}

h1{

font-size:30px;

margin-bottom:10px;

color:var(--forest);

}

.subtitle{

color:#666;

margin-bottom:35px;

line-height:1.6;

}

input{

width:100%;

padding:18px;

margin-bottom:18px;

border-radius:14px;

border:1px solid #ddd;

font-size:16px;

}
button{

width:100%;

padding:18px;

border:none;

border-radius:14px;

background:#17261b;

color:white;

font-size:17px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#314632;

}

#error{

margin-top:18px;

color:#b00020;

font-weight:600;

display:none;

}

.small{

margin-top:30px;

font-size:14px;

color:#888;

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">Sorted<span>.</span></div>

<h1>Client Portal</h1>

<p class="subtitle">

Sign in to view your upcoming visits, invoices, documents and membership details.

</p>

<input
type="email"
id="email"
placeholder="Email address">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">

Sign In

</button>

<div id="error">

Incorrect email or password.

</div>

<p class="small">

© Sorted.

</p>

</div>

<script type="module" src="../firebase.js"></script>

<script type="module" src="portal.js"></script>

</body>

</html>
