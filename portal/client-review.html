<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Client Review | Sorted.</title>

<link rel="icon" href="../favicon.png">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#f8f1e7;
color:#17261b;
}

header{
background:#17261b;
color:white;
padding:24px;
font-size:32px;
font-weight:800;
}

.container{
max-width:900px;
margin:auto;
padding:30px 20px;
}

.card{
background:white;
padding:28px;
border-radius:22px;
box-shadow:0 12px 30px rgba(0,0,0,.08);
}

h1{
margin-top:0;
margin-bottom:10px;
}

p{
color:#666;
line-height:1.6;
}

label{
display:block;
margin-top:20px;
font-weight:700;
}

input,
textarea,
select{
width:100%;
padding:14px;
margin-top:8px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
box-sizing:border-box;
font-family:inherit;
}

textarea{
min-height:140px;
resize:vertical;
}

button{
margin-top:25px;
background:#17261b;
color:white;
border:none;
padding:16px 24px;
border-radius:999px;
font-size:17px;
font-weight:700;
cursor:pointer;
width:100%;
}

button:hover{
background:#314632;
}

.back{
display:inline-block;
margin-top:30px;
padding:16px 24px;
background:#17261b;
color:white;
text-decoration:none;
border-radius:999px;
font-weight:700;
}

</style>
</head>

<body>

<header>Sorted.</header>

<div class="container">

<div class="card">

<h1>Client Review</h1>

<p>
We'd love to hear how we're doing. Your feedback helps us continually improve our service.
</p>
<form action="https://formsubmit.co/contact@sortedlife.org.uk" method="POST">

<input type="hidden" name="_subject" value="New Client Review">
<input type="hidden" name="_captcha" value="false">

<label>Your Name</label>
<input type="text" name="Name" required>

<label>Overall Rating</label>
<select name="Rating" required>
<option value="">Choose...</option>
<option>⭐⭐⭐⭐⭐ Excellent</option>
<option>⭐⭐⭐⭐ Very Good</option>
<option>⭐⭐⭐ Good</option>
<option>⭐⭐ Fair</option>
<option>⭐ Poor</option>
</select>

<label>Your Review</label>
<textarea name="Review" required></textarea>

<label>May we publish your review on our website?</label>
<select name="Permission">
<option>Yes</option>
<option>No</option>
</select>

<button type="submit">Submit Review</button>

</form>

<a class="back" href="dashboard.html">← Back to Dashboard</a>

</div>

</div>

</body>
</html>
