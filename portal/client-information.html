<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Client Information | Sorted.</title>
<link rel="icon" href="../favicon.png">

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8f1e7;color:#17261b;}
header{background:#17261b;color:white;padding:24px;font-size:32px;font-weight:800;}
.container{max-width:900px;margin:auto;padding:30px 20px;}
.card{background:white;padding:28px;border-radius:22px;box-shadow:0 12px 30px rgba(0,0,0,.08);}
h1{margin-top:0;}
p{color:#666;line-height:1.6;}
label{display:block;margin-top:20px;font-weight:700;}
input,textarea,select{width:100%;padding:14px;margin-top:8px;border:1px solid #ddd;border-radius:12px;font-size:16px;box-sizing:border-box;font-family:inherit;}
textarea{min-height:120px;resize:vertical;}
button{margin-top:25px;background:#17261b;color:white;border:none;padding:16px 24px;border-radius:999px;font-size:17px;font-weight:700;cursor:pointer;width:100%;}
.back{display:inline-block;margin-top:30px;padding:16px 24px;background:#17261b;color:white;text-decoration:none;border-radius:999px;font-weight:700;}
</style>
</head>

<body>

<header>Sorted.</header>

<div class="container">
<div class="card">

<h1>Client Information Form</h1>
<p>Please complete this form so we have the correct details before providing support.</p>

<form action="https://formsubmit.co/contact@sortedlife.org.uk" method="POST">

<input type="hidden" name="_subject" value="New Client Information Form">
<input type="hidden" name="_captcha" value="false">

<label>Full Name</label>
<input type="text" name="Full Name" required>

<label>Date of Birth</label>
<input type="date" name="Date of Birth">

<label>Address</label>
<textarea name="Address" required></textarea>

<label>Phone Number</label>
<input type="tel" name="Phone Number" required>

<label>Email Address</label>
<input type="email" name="Email Address" required>

<label>Emergency Contact Name</label>
<input type="text" name="Emergency Contact Name" required>

<label>Emergency Contact Phone</label>
<input type="tel" name="Emergency Contact Phone" required>

<label>GP Surgery / Doctor Details</label>
<textarea name="GP Details"></textarea>

<label>Medical Conditions</label>
<textarea name="Medical Conditions"></textarea>

<label>Allergies</label>
<textarea name="Allergies"></textarea>

<label>Pets at the Property</label>
<textarea name="Pets at Property"></textarea>

<label>Access Instructions</label>
<textarea name="Access Instructions" placeholder="Keys, alarms, parking, entry notes, etc."></textarea>

<label>Preferred Contact Method</label>
<select name="Preferred Contact Method">
<option>Email</option>
<option>Phone</option>
<option>Text Message</option>
<option>WhatsApp</option>
</select>

<label>Anything Else We Should Know?</label>
<textarea name="Additional Notes"></textarea>

<button type="submit">Submit Form</button>

</form>

<a class="back" href="forms.html">← Back to Forms</a>

</div>
</div>

</body>
</html>
